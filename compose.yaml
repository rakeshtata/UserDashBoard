services:
  jsonServer-app:
    build: jsonServer/
    image: dashboard-jsonserver-image
    ports:
      - "8000:8000"
    networks:
      - app-network
    restart: unless-stopped  

  web-app:
    build: web/
    image: dashboard-web-image
    ports:
      - "3000:3000" 
    networks:
      - app-network
    restart: unless-stopped  

  bff-gateway:
    build: server/
    image: dashboard-bff-image
    ports:
      - "4000:4000"
    environment:
      - APP_NAME=bff-gateway
      - AUTH_SERVICE_URL=http://auth-service:4001
      - USER_SERVICE_URL=http://user-service:4002
      - ANALYTICS_SERVICE_URL=http://analytics-service:4003
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_URI=mongodb://admin:password@mongodb:27017/mydb?authSource=admin
    networks:
      - app-network   
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  auth-service:
    build: server/
    image: dashboard-auth-image
    environment:
      - APP_NAME=auth-service
    networks:
      - app-network
    restart: unless-stopped

  user-service:
    build: server/
    image: dashboard-user-image
    environment:
      - APP_NAME=user-service
    networks:
      - app-network
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  analytics-service:
    build: server/
    image: dashboard-analytics-image
    environment:
      - APP_NAME=analytics-service
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html
    depends_on:
      - bff-gateway
    networks:
      - app-network
    restart: unless-stopped  

  redis:
    image: redis:6.2-alpine
    ports:
      - '6379:6379'
    command: redis-server --save 20 1 --loglevel warning
    volumes: 
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped      

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=mydb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped  

networks:
  app-network:
    driver: bridge    
volumes:
  redis:
    driver: local
  mongodb_data:
    driver: local  
